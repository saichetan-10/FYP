<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
  <style>
    .box { fill:#ffffff; stroke:#2f4f4f; stroke-width:2; rx:14; }
    .text { font: 16px Arial, sans-serif; fill:#1f2937; }
    .title { font: 20px Arial, sans-serif; font-weight: bold; }
    .arrow { stroke:#2f4f4f; stroke-width:3; fill:none; marker-end:url(#arrowhead);}  
  </style>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4f4f" />
    </marker>
  </defs>
  <rect x="20" y="20" width="920" height="520" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
  <text x="40" y="56" class="title">System Architecture</text>

  <rect x="70" y="110" width="180" height="120" class="box" />
  <text x="160" y="145" text-anchor="middle" class="text">User / Analyst</text>
  <text x="160" y="170" text-anchor="middle" class="text">Natural Language Query</text>

  <rect x="330" y="90" width="220" height="160" class="box" />
  <text x="440" y="125" text-anchor="middle" class="title">NL Retrieval Pipeline</text>
  <text x="440" y="150" text-anchor="middle" class="text">Intent Parsing → Ontology Mapping</text>
  <text x="440" y="175" text-anchor="middle" class="text">Constraint Validation → Plan Generation</text>
  <text x="440" y="200" text-anchor="middle" class="text">Result Verification</text>

  <rect x="620" y="110" width="220" height="120" class="box" />
  <text x="730" y="145" text-anchor="middle" class="text">Database / Data Layer</text>
  <text x="730" y="170" text-anchor="middle" class="text">PostgreSQL / SQLAlchemy</text>

  <rect x="330" y="310" width="220" height="140" class="box" />
  <text x="440" y="345" text-anchor="middle" class="title">Monitoring &amp; Validation</text>
  <text x="440" y="375" text-anchor="middle" class="text">Semantic Drift Metric</text>
  <text x="440" y="400" text-anchor="middle" class="text">Audit Log + Provenance</text>

  <path class="arrow" d="M 250 170 L 330 170" />
  <path class="arrow" d="M 550 170 L 620 170" />
  <path class="arrow" d="M 440 250 L 440 310" />
  <path class="arrow" d="M 440 450 L 440 470" />
</svg>