ity(entity)<br />        if ontology_entity:<br />            mappings.append(OntologyMapping(...))<br />    return OntologyMapping(mappings=mappings)</p></span></div></foreignObject></g></g></g></g><g class="node default" id="my-svg-flowchart-A-0" data-look="classic" transform="translate(592.8984375, 190)"><rect class="basic label-container" style="" x="-110.3515625" y="-27" width="220.703125" height="54"/><g class="label" style="" transform="translate(-80.3515625, -12)"><rect/><foreignObject width="160.703125" height="24"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="nodeLabel"><p>Input: ExtractedIntent</p></span></div></foreignObject></g></g><g class="node default" id="my-svg-flowchart-B-1" data-look="classic" transform="translate(592.8984375, 449)"><rect class="basic label-container" style="" x="-108.75" y="-27" width="217.5" height="54"/><g class="label" style="" transform="translate(-78.75, -12)"><rect/><foreignObject width="157.5" height="24"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="nodeLabel"><p>OntologyMapperAgent</p></span></div></foreignObject></g></g><g class="node default" id="my-svg-flowchart-C-3" data-look="classic" transform="translate(592.8984375, 553)"><rect class="basic label-container" style="" x="-118.0390625" y="-27" width="236.078125" height="54"/><g class="label" style="" transform="translate(-88.0390625, -12)"><rect/><foreignObject width="176.078125" height="24"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="nodeLabel"><p>Map Entities to Ontology</p></span></div></foreignObject></g></g><g class="node default" id="my-svg-flowchart-D-5" data-look="classic" transform="translate(592.8984375, 657)"><rect